services:

  postgres:

    image: postgres:16

    container_name: ecommerce_postgres

    restart: always

    environment:

      POSTGRES_USER: airflow

      POSTGRES_PASSWORD: airflow

      POSTGRES_DB: ecommerce_db

    ports:

      - "5433:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./database:/docker-entrypoint-initdb.d

volumes:

  postgres_data: